<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>I am Sorry!</title> <style> body { text-align: center; font-family: Arial, sans-serif; margin-top: 100px; } button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; } #noBtn { position: absolute; } </style> </head> <body> <h1>Are you still mad at me?</h1> <p>Please forgive me? ❤️</p> <button onclick="yesClicked()">Yes, I forgive you</button> <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button> <script> function yesClicked() { alert("Yay! You are the best! 🥰"); document.body.innerHTML = "<h1>I love you! ❤️</h1>"; } function moveButton() { var x = Math.random() * (window.innerWidth - 100); var y = Math.random() * (window.innerHeight - 100); document.getElementById('noBtn').style.left = x + 'px'; document.getElementById('noBtn').style.top = y + 'px'; } </script> </body> </html>
