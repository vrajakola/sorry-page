<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Khushi ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
}

/* INTRO SCREEN */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    animation: fadeOut 4s forwards;
    animation-delay: 4s;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* STAR SKY */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: transparent;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* SLIDESHOW */
#slideshow {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

#slideshow img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: fadeSlide 25s infinite;
}

#slideshow img:nth-child(1){animation-delay:0s;}
#slideshow img:nth-child(2){animation-delay:5s;}
#slideshow img:nth-child(3){animation-delay:10s;}
#slideshow img:nth-child(4){animation-delay:15s;}
#slideshow img:nth-child(5){animation-delay:20s;}

@keyframes fadeSlide {
    0%{opacity:0;}
    10%{opacity:1;}
    30%{opacity:1;}
    40%{opacity:0;}
    100%{opacity:0;}
}

/* MAIN CONTENT */
#content {
    position: relative;
    top: 20%;
    padding: 20px;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: white;
    color: #ff4d88;
    font-weight: bold;
    margin-top: 20px;
    cursor: pointer;
}

/* FINAL MESSAGE */
#final {
    display: none;
    position: fixed;
    top: 40%;
    width: 100%;
    animation: pop 1.5s ease forwards;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>For The Most Beautiful Girl In My Life ❤️</h1>
    <h2>Khushi ✨</h2>
</div>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- SLIDESHOW -->
<div id="slideshow">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
    <img src="img5.jpg">
</div>

<!-- MAIN CONTENT -->
<div id="content">
    <h1 id="typing"></h1>
    <button onclick="forgive()">Forgive Me? 🥺</button>
</div>

<div id="final">
    <h1>You Are The Best ❤️</h1>
    <h2>I Love You So Much 😘</h2>
    <h3>I Owe You A Perfect Dinner Date 🍽✨</h3>
</div>

<audio id="bgMusic" loop>
    <source src="darkhaast.mp3" type="audio/mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>

/* START MUSIC AFTER FIRST CLICK */
document.body.addEventListener("click", function(){
    document.getElementById("bgMusic").play();
},{once:true});

/* STAR GENERATION */
for(let i=0;i<200;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    document.getElementById("stars").appendChild(star);
}

/* TYPING */
const text="Khushi... You are my happiness, my peace, my everything. I am truly sorry. Please forgive me ❤️";
let i=0;
function type(){
    if(i<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(i);
        i++;
        setTimeout(type,50);
    }
}
setTimeout(type,4500);

/* FIREWORKS */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function forgive(){
    document.getElementById("final").style.display="block";
    for(let i=0;i<200;i++){
        setTimeout(()=>{
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width,
                    Math.random()*canvas.height,
                    3,0,Math.PI*2);
            ctx.fillStyle="white";
            ctx.fill();
        },i*15);
    }
}

</script>

</body>
</html>
